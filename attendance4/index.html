<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Register — GNOKE Attendance</title>
    <style>
        :root {
            --primary:    #1a2e21;
            --emerald:    #065f46;
            --emerald2:   #34d399;
            --blue:       #2563eb;
            --pink:       #db2777;
            --gray-bg:    #f0f4f1;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--gray-bg);
            color: #1f2937;
            font-family: system-ui, -apple-system, sans-serif;
            padding-bottom: 3rem;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── Week tabs ── */
        .week-nav {
            background: white;
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
        }
        .week-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
            background: white;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            color: #64748b;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .week-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ── Action bar ── */
        .week-action-bar {
            background: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
        }
        .week-action-label {
            font-size: 12px;
            font-weight: 800;
            color: #64748b;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .reset-btn {
            background: transparent;
            color: #ef4444;
            border: 1px solid #fca5a5;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background 0.15s;
        }
        .reset-btn:hover { background: #fef2f2; }

        main { padding: 1.5rem; max-width: 800px; margin: auto; }

        /* ── Roll stats ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            text-align: center;
            border-bottom: 4px solid #e5e7eb;
        }
        .stat-label {
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            padding-top: 5px;
        }

        /* ── Table ── */
        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            border: 1px solid #e5e7eb;
        }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        thead { background: var(--primary); color: white; }
        th { padding: 12px; font-size: 11px; letter-spacing: 1px; }
        td { border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; padding: 0; }
        tr:last-child td { border-bottom: none; }

        .day-label {
            font-weight: 800;
            color: #64748b;
            background: #f8fafc;
            width: 60px;
            padding: 15px 8px;
        }

        /* Auto-filled cells — read from attendance0 */
        .auto-cell {
            padding: 15px 5px;
            font-size: 15px;
            font-weight: 700;
            color: var(--emerald);
            background: #f0fdf4;
        }
        .auto-cell.boys { color: var(--blue); background: #eff6ff; }
        .auto-cell.girls { color: var(--pink); background: #fdf2f8; }
        .auto-cell.zero { color: #d1d5db; background: transparent; }

        /* Times open — still manual */
        input.open-input {
            width: 100%;
            border: none;
            padding: 15px 5px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            background: transparent;
        }
        input.open-input:focus { background: #f8fafc; }

        .total-row { background: #f8fafc; }
        .total-row td { padding: 14px 8px; font-weight: 900; color: var(--primary); }

        /* ── Percentage card ── */
        .percentage-section {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            margin-top: 2rem;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 1px solid #e5e7eb;
        }
        .percent-box {
            display: inline-block;
            background: var(--emerald);
            color: white;
            padding: 10px 30px;
            border-radius: 12px;
            font-size: 32px;
            font-weight: 900;
            margin-top: 10px;
        }

        /* Source note */
        .source-note {
            font-size: 10px;
            font-weight: 700;
            color: #9ca3af;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <div>
        <small style="opacity:0.5;font-weight:bold;letter-spacing:2px;">GNOKE</small>
        <h1 id="header-title" style="margin:0;font-size:18px;">Session Register: Week 1</h1>
    </div>
</header>

<nav class="week-nav" id="week-tabs"></nav>

<div class="week-action-bar">
    <span id="action-week-label" class="week-action-label">Week 1</span>
    <button class="reset-btn" onclick="clearOpenings()">Reset Openings</button>
</div>

<main>

    <!-- Roll stats — pulled from attendance0 -->
    <div class="stats-grid">
        <div class="stat-card" style="border-color:var(--blue);">
            <div class="stat-label">Boys on Roll</div>
            <div id="roll-boys" class="stat-value" style="color:var(--blue);">0</div>
        </div>
        <div class="stat-card" style="border-color:var(--pink);">
            <div class="stat-label">Girls on Roll</div>
            <div id="roll-girls" class="stat-value" style="color:var(--pink);">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total on Roll</div>
            <div id="roll-total" class="stat-value">0</div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Day</th>
                    <th style="color:#93c5fd;">Boys Present</th>
                    <th style="color:#f9a8d4;">Girls Present</th>
                    <th>Times Open</th>
                    <th style="color:var(--emerald2);">Total Present</th>
                </tr>
            </thead>
            <tbody id="session-body"></tbody>
        </table>
    </div>

    <div class="percentage-section">
        <div class="stat-label">Weekly Attendance Rate</div>
        <div id="percent-display" class="percent-box">0.0%</div>
        <div id="formula-text" style="margin-top:15px;font-size:11px;color:#94a3b8;font-weight:600;"></div>
    </div>

    <p class="source-note">✦ Boys & Girls present auto-filled from Daily Register</p>

</main>

<script>
const DAYS_LABEL = ['Mon','Tue','Wed','Thu','Fri'];
let currentWeek = 1;

/* ═══════════════════════════════════════════════════════════════════
   PULL FROM ATTENDANCE0
   daily_register shape:
   {
     male:   { weeks: [ { ending, students: [{name, days:[{am,pm}×5]}] } ] },
     female: { weeks: [ { ending, students: [{name, days:[{am,pm}×5]}] } ] }
   }
   For each day we sum all students' am+pm strokes (value===1 only).
═══════════════════════════════════════════════════════════════════ */
function getDailyTotals(weekIndex) {
    const raw = localStorage.getItem('daily_register');
    const dr  = raw ? JSON.parse(raw) : null;

    const result = {
        boysRoll:  0,
        girlsRoll: 0,
        days: DAYS_LABEL.map(() => ({ boys: 0, girls: 0 }))
    };

    if (!dr) return result;

    const maleWeek   = dr.male?.weeks?.[weekIndex];
    const femaleWeek = dr.female?.weeks?.[weekIndex];

    result.boysRoll  = dr.male?.weeks?.[0]?.students?.length  || 0;
    result.girlsRoll = dr.female?.weeks?.[0]?.students?.length || 0;

    // Sum strokes per day for boys
    if (maleWeek) {
        maleWeek.students.forEach(student => {
            student.days.forEach((day, di) => {
                if (day.am === 1) result.days[di].boys++;
                if (day.pm === 1) result.days[di].boys++;
            });
        });
    }

    // Sum strokes per day for girls
    if (femaleWeek) {
        femaleWeek.students.forEach(student => {
            student.days.forEach((day, di) => {
                if (day.am === 1) result.days[di].girls++;
                if (day.pm === 1) result.days[di].girls++;
            });
        });
    }

    return result;
}

/* ═══════════════════════════════════════════════════════════════════
   WEEK TABS
═══════════════════════════════════════════════════════════════════ */
function initWeekNav() {
    const totalWeeks = parseInt(localStorage.getItem('attendance_global_weeks')) || 1;
    const nav = document.getElementById('week-tabs');
    nav.innerHTML = '';
    for (let i = 1; i <= totalWeeks; i++) {
        const btn = document.createElement('button');
        btn.className = `week-btn ${i === currentWeek ? 'active' : ''}`;
        btn.textContent = `Week ${i}`;
        btn.onclick = () => switchWeek(i);
        nav.appendChild(btn);
    }
}

function switchWeek(n) {
    currentWeek = n;
    document.getElementById('header-title').textContent  = `Session Register: Week ${n}`;
    document.getElementById('action-week-label').textContent = `Week ${n}`;
    initWeekNav();
    render();
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════════ */
function render() {
    const totals  = getDailyTotals(currentWeek - 1);
    const openings = loadOpenings();

    // Roll stats
    document.getElementById('roll-boys').textContent  = totals.boysRoll;
    document.getElementById('roll-girls').textContent = totals.girlsRoll;
    document.getElementById('roll-total').textContent = totals.boysRoll + totals.girlsRoll;

    const tbody = document.getElementById('session-body');
    tbody.innerHTML = '';

    let sumBoys = 0, sumGirls = 0, sumOpen = 0;

    DAYS_LABEL.forEach((day, di) => {
        const boys  = totals.days[di].boys;
        const girls = totals.days[di].girls;
        const open  = openings[di] || '';
        const total = boys + girls;

        sumBoys  += boys;
        sumGirls += girls;
        sumOpen  += parseInt(open) || 0;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="day-label">${day}</td>
            <td class="auto-cell boys ${boys === 0 ? 'zero' : ''}">${boys || ''}</td>
            <td class="auto-cell girls ${girls === 0 ? 'zero' : ''}">${girls || ''}</td>
            <td><input type="number" class="open-input"
                       value="${open}"
                       data-di="${di}"
                       oninput="onOpeningInput(this)"
                       placeholder="—" /></td>
            <td class="auto-cell ${total === 0 ? 'zero' : ''}">${total || ''}</td>
        `;
        tbody.appendChild(tr);
    });

    // Totals row
    const totalPresent = sumBoys + sumGirls;
    tbody.innerHTML += `
        <tr class="total-row">
            <td>TOTAL</td>
            <td style="color:var(--blue);">${sumBoys || ''}</td>
            <td style="color:var(--pink);">${sumGirls || ''}</td>
            <td>${sumOpen || ''}</td>
            <td style="color:var(--emerald);">${totalPresent || ''}</td>
        </tr>`;

    // Percentage
    const totalRoll   = totals.boysRoll + totals.girlsRoll;
    const maxPossible = totalRoll * sumOpen;
    const percentage  = maxPossible > 0
        ? ((totalPresent / maxPossible) * 100).toFixed(1)
        : '0.0';

    const box = document.getElementById('percent-display');
    box.textContent = percentage + '%';
    box.style.background =
        parseFloat(percentage) >= 90 ? 'var(--emerald)' :
        parseFloat(percentage) >= 70 ? 'var(--blue)' : '#64748b';

    document.getElementById('formula-text').textContent =
        `(${totalPresent} present / ${maxPossible} possible) × 100`;

    // Persist summary for attendance3
    pushSummary(totalPresent, sumOpen);
}

/* ═══════════════════════════════════════════════════════════════════
   OPENINGS — only manual input, persisted per week
═══════════════════════════════════════════════════════════════════ */
function openingsKey() { return `session4_openings_w${currentWeek}`; }

function loadOpenings() {
    const raw = localStorage.getItem(openingsKey());
    return raw ? JSON.parse(raw) : [10, 10, 10, 10, 10];
}

function saveOpenings() {
    const inputs = document.querySelectorAll('.open-input');
    const vals = Array.from(inputs).map(i => i.value);
    localStorage.setItem(openingsKey(), JSON.stringify(vals));
}

function onOpeningInput(input) {
    saveOpenings();
    render();
}

function clearOpenings() {
    if (!confirm(`Reset Times Open for Week ${currentWeek}?`)) return;
    localStorage.removeItem(openingsKey());
    render();
}

/* ═══════════════════════════════════════════════════════════════════
   PUSH SUMMARY → attendance3
   Keeps attendance_summary_data compatible with existing attendance3
═══════════════════════════════════════════════════════════════════ */
function pushSummary(totalPresent, totalOpen) {
    const weeks    = parseInt(localStorage.getItem('attendance_global_weeks')) || 1;
    const existing = JSON.parse(localStorage.getItem('attendance_summary_data') || '[]');

    // Ensure array is long enough
    while (existing.length < weeks) existing.push({ w: existing.length + 1, o: 10 });

    existing[currentWeek - 1] = {
        w: currentWeek,
        o: totalOpen,
        present: totalPresent
    };

    localStorage.setItem('attendance_summary_data', JSON.stringify(existing));
}

/* ═══════════════════════════════════════════════════════════════════
   LIVE SYNC — re-render when attendance0 updates
═══════════════════════════════════════════════════════════════════ */
window.addEventListener('storage', e => {
    if (e.key === 'daily_register' || e.key === 'attendance_global_weeks') {
        initWeekNav();
        render();
    }
});

/* ═══════════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════════ */
window.onload = () => {
    initWeekNav();
    render();
};
</script>

<script src="../hmenu.js"></script>
</body>
</html>
